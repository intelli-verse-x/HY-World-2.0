# Dedicated full-stack HY-World node class. WorldStereo is upstream-tested
# with >=4 GPUs and reports 8×H20. Preflight proved 24GB A10G OOM at native
# HY-Pano resolution; stage A runs on one 80GB H100 rank, then checkpoints
# before the WorldStereo/3DGS topology resumes it. Single-rank 48GB L40S
# attempts were rejected after model execution consumed >42GiB and failed
# in cuBLAS/LoRA kernels. p5.4xlarge is the no-waste 80GB-rank target once
# AWS supplies on-demand or reserved capacity.
# The 1Ti
# ephemeral root holds the expanded ~250Gi S3 model mirror plus intermediates;
# durable checkpoints are uploaded to S3 after every stage.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: worldgen-fullstack-p5
spec:
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      deleteOnTermination: true
      iops: 12000
      throughput: 500
      volumeSize: 1000Gi
      volumeType: gp3
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  role: KarpenterNodeRole-ai-cart-auto-cluster
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  capacityReservationSelectorTerms:
  - tags:
      ManagedBy: hy-world-fullstack
      Workload: worldgen-fullstack
  tags:
    Environment: production
    InspectorEc2Exclusion: "true"
    ManagedBy: karpenter
    Team: content-factory
    Workload: worldgen-fullstack
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: worldgen-fullstack-p5
spec:
  disruption:
    budgets:
    - nodes: 100%
      reasons: [Empty]
    - nodes: "1"
      reasons: [Underutilized, Drifted]
    consolidateAfter: 15m
    consolidationPolicy: WhenEmpty
  limits:
    cpu: "16"
    memory: 256Gi
    nvidia.com/gpu: "1"
  template:
    metadata:
      labels:
        workload-type: gpu
        gpu-class: worldgen-fullstack-p5
        dedicated: worldgen-fullstack-p5
    spec:
      expireAfter: 168h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: worldgen-fullstack-p5
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        # Do not fall through to unreserved p5 capacity: the reservation
        # lifecycle controller owns creation/cancellation and cost alerts.
        values: [reserved]
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: topology.kubernetes.io/zone
        operator: In
        # Keep every discovered/offered zone eligible once AWS capacity or an
        # open capacity reservation becomes available.
        values: [us-east-1a, us-east-1b, us-east-1c]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: [p5.4xlarge]
      taints:
      - effect: NoSchedule
        key: dedicated
        value: worldgen-fullstack-p5
      - effect: NoSchedule
        key: nvidia.com/gpu
  weight: 50
