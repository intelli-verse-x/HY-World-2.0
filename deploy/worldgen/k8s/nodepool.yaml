# Dedicated full-stack HY-World node class. WorldStereo is upstream-tested
# with >=4 GPUs and recommends 8; an 8xA10G g5.48xlarge gives FSDP enough
# shards while retaining the upstream 24GB-per-rank code path. The 600Gi
# ephemeral root holds the ~190Gi model mirror plus stage intermediates;
# durable checkpoints are uploaded to S3 after every stage.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: hy-world-full
spec:
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      deleteOnTermination: true
      iops: 12000
      throughput: 500
      volumeSize: 600Gi
      volumeType: gp3
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  role: KarpenterNodeRole-ai-cart-auto-cluster
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  tags:
    Environment: production
    InspectorEc2Exclusion: "true"
    ManagedBy: karpenter
    Team: content-factory
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: hy-world-full
spec:
  disruption:
    budgets:
    - nodes: 100%
      reasons: [Empty]
    - nodes: "1"
      reasons: [Underutilized, Drifted]
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  limits:
    cpu: "192"
    memory: 768Gi
    nvidia.com/gpu: "8"
  template:
    metadata:
      labels:
        workload-type: gpu
        gpu-class: hy-world-full
    spec:
      expireAfter: 168h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: hy-world-full
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values: [spot]
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: [g5.48xlarge]
      taints:
      - effect: NoSchedule
        key: nvidia.com/gpu
  weight: 50
