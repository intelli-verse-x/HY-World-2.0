# Dedicated full-stack HY-World node class. WorldStereo is upstream-tested
# with >=4 GPUs and reports 8×H20. Preflight proved 24GB A10G OOM at native
# HY-Pano resolution; 4×48GB L40S on g6e.24xlarge is the capacity fallback.
# The 1Ti
# ephemeral root holds the expanded ~250Gi S3 model mirror plus intermediates;
# durable checkpoints are uploaded to S3 after every stage.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: hy-world-full
spec:
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      deleteOnTermination: true
      iops: 12000
      throughput: 500
      volumeSize: 1000Gi
      volumeType: gp3
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  role: KarpenterNodeRole-ai-cart-auto-cluster
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: ai-cart-auto-cluster
  tags:
    Environment: production
    InspectorEc2Exclusion: "true"
    ManagedBy: karpenter
    Team: content-factory
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: hy-world-full
spec:
  disruption:
    budgets:
    - nodes: 100%
      reasons: [Empty]
    - nodes: "1"
      reasons: [Underutilized, Drifted]
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  limits:
    cpu: "96"
    memory: 768Gi
    nvidia.com/gpu: "4"
  template:
    metadata:
      labels:
        workload-type: gpu
        gpu-class: hy-world-full
    spec:
      expireAfter: 168h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: hy-world-full
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        # Bounded fallback after 24GB/rank A10G OOM. Revert after candidate A.
        values: [on-demand]
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: topology.kubernetes.io/zone
        operator: In
        values: [us-east-1a, us-east-1b, us-east-1d]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: [g6e.24xlarge]
      taints:
      - effect: NoSchedule
        key: nvidia.com/gpu
  weight: 50
