# New Karpenter NodePool for 4-GPU spot nodes (g6.12xlarge / g5.12xlarge).
# The existing gpu-workloads-* pools only offer 1-GPU g6 shapes or g5 up to
# 12xlarge with the nvidia-a10g label; this pool spans both 4-GPU shapes so
# Karpenter can pick the cheapest spot capacity. Reuses the existing
# gpu-workloads EC2NodeClass (200Gi gp3 root). Disruption settings copied
# from the gpu-workloads pool (15-min empty-node reclaim).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-workloads-multi
spec:
  disruption:
    budgets:
    - nodes: 100%
      reasons: [Empty]
    - nodes: "1"
      reasons: [Underutilized, Drifted]
    consolidateAfter: 15m
    consolidationPolicy: WhenEmptyOrUnderutilized
  limits:
    cpu: "96"
    memory: 384Gi
    nvidia.com/gpu: "8"
  template:
    metadata:
      labels:
        workload-type: gpu
        gpu-class: multi-24gb
    spec:
      expireAfter: 168h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-workloads
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values: [spot]
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: [g6.12xlarge, g5.12xlarge]
      taints:
      - effect: NoSchedule
        key: nvidia.com/gpu
  weight: 40
