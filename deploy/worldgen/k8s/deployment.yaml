apiVersion: apps/v1
kind: Deployment
metadata:
  name: hy-world-full-worker
  namespace: aicart
  labels:
    app: hy-world-full-worker
    workload-type: gpu
spec:
  replicas: 0            # scaled by KEDA (worldgen-scaler), 0 <-> 1
  selector:
    matchLabels:
      app: hy-world-full-worker
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
      labels:
        app: hy-world-full-worker
        workload-type: gpu
    spec:
      serviceAccountName: ssm-access
      terminationGracePeriodSeconds: 120
      nodeSelector:
        gpu-class: hy-world-full
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values: [g6e.24xlarge]
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      initContainers:
      # Same pattern as vllm-chat's s3-model-sync: hydrate the HF cache from
      # the private S3 mirror. Uses the S3
      # gateway endpoint, no NAT.
      - name: s3-model-sync
        image: 970547373533.dkr.ecr.us-east-1.amazonaws.com/ecr-public/aws-cli/aws-cli:2.22.35
        command:
        - sh
        - -c
        - |
          set -u
          SRC=s3://intelliverse-hyworld-private-us-east-1/models/hy-world/hf
          DST=/models/hf-cache
          aws configure set default.s3.max_concurrent_requests 32
          if aws s3 ls "$SRC/" >/dev/null 2>&1; then
            echo "Syncing $SRC -> $DST"
            # Snapshot objects were dereferenced to regular files during the
            # mirror. Skip duplicate HF blob objects and lock metadata.
            time aws s3 sync "$SRC" "$DST" --only-show-errors \
              --exclude 'hub/*/blobs/*' --exclude 'hub/.locks/*' \
              && echo "S3 model sync OK" \
              || echo "WARN: s3 sync failed; workers will fall back to HF download via NAT"
          else
            echo "WARN: $SRC not mirrored yet; workers will fall back to HF download via NAT"
          fi
        resources:
          requests: {cpu: "2", memory: 1Gi}
          limits: {cpu: "8", memory: 4Gi}
        volumeMounts:
        - mountPath: /models/hf-cache
          name: model-cache
      containers:
      - name: worker
        image: 970547373533.dkr.ecr.us-east-1.amazonaws.com/hy-world-full-worker@sha256:7ec81634b68391f40a47c073264b50e854b33d3709b8d9656bc602889134dc93
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keda-redis-auth
              key: password
        - name: VLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: LITELLM_MASTER_KEY
        - name: DISCORD_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: admin-portal-discord-webhook
              key: DISCORD_PORTAL_WEBHOOK_URL
        - name: AWS_S3_BUCKET_NAME
          value: intelliverse-hyworld-private-us-east-1
        - name: WORLDGEN_QUEUE
          value: pipeline:signal:worldgen-full
        - name: WORLDGEN_PROCESSING_QUEUE
          value: pipeline:worldgen-full:processing
        - name: WORLDGEN_DONE_QUEUE
          value: pipeline:done:worldgen-full
        - name: S3_CHECKPOINT_BASE
          value: worldgen-full-checkpoints
        - name: S3_OUTPUT_BASE
          value: worldgen-full-staging
        - name: ALLOW_PRODUCTION_PROMOTION
          value: "0"
        - name: AWS_REGION
          value: us-east-1
        - name: SAM3_REPO_ID           # facebook/sam3 is HF-gated; ungated mirror
          value: DiffusionWave/sam3
        - name: VLM_MODEL
          value: gemini/gemini-2.5-flash
        - name: IMAGE_MODEL
          value: gemini/gemini-3.1-flash-image
        - name: SCENES_DIR
          value: /workspace/scenes
        - name: HF_HOME
          value: /models/hf-cache
        - name: NGPU
          value: "4"
        - name: SOURCE_COMMIT
          value: ef5d341
        - name: IMAGE_URI
          value: 970547373533.dkr.ecr.us-east-1.amazonaws.com/hy-world-full-worker@sha256:7ec81634b68391f40a47c073264b50e854b33d3709b8d9656bc602889134dc93
        - name: INSTANCE_TYPE
          value: g6e.24xlarge
        - name: INSTANCE_HOURLY_USD
          value: "15.0656"
        - name: MAX_JOB_SECONDS
          value: "16200"
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: expandable_segments:True
        resources:
          requests:
            cpu: "32"
            memory: 300Gi
            nvidia.com/gpu: "4"
          limits:
            cpu: "80"
            memory: 700Gi
            nvidia.com/gpu: "4"
        volumeMounts:
        - mountPath: /models/hf-cache
          name: model-cache
        - mountPath: /workspace/scenes
          name: scenes
        - mountPath: /dev/shm
          name: shm
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 350Gi
      - name: scenes
        emptyDir:
          sizeLimit: 500Gi
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
