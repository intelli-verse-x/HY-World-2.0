# One-shot CPU job: download the HY-World 2.0 smoke-test weight set from
# HuggingFace into the scratch PVC (HF cache layout), then mirror it to
# s3://intelli-verse-x-media/models/hy-world/hf for the initContainer sync.
#
# The full HY-World-2.0 HF repo is ~175 GB and HY-Pano's official
# HunyuanImage-3 backend alone is ~170 GB (80B model, unusable on 24 GB
# GPUs), so this stages ONLY what the pipeline actually loads (~190 GB):
#   Qwen/Qwen-Image-Edit-2509 (58G, pano base) + HY-Pano-2.0 LoRA (0.9G)
#   Wan-AI/Wan2.1-I2V-14B-480P-Diffusers (90G, WorldStereo base)
#   hanshanxue/WorldStereo worldstereo-memory-dmd (35G)
#   tencent/HY-World-2.0 HY-WorldMirror-2.0 (5G)
#   DiffusionWave/sam3 (3.5G, ungated mirror of gated facebook/sam3)
#   Ruicheng/moge-2-vitl-normal, naver-iv/zim-anything-vitl,
#   IDEA-Research/grounding-dino-tiny, facebook/dinov2-base (~4G)
apiVersion: batch/v1
kind: Job
metadata:
  name: hy-world-stage-weights
  namespace: aicart
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: hy-world-stage-weights
    spec:
      serviceAccountName: ssm-access
      restartPolicy: Never
      containers:
      - name: stage
        image: public.ecr.aws/docker/library/python:3.12-slim
        command:
        - bash
        - -c
        - |
          set -euo pipefail
          pip install --no-cache-dir --root-user-action=ignore -q \
            "huggingface_hub[hf_transfer]==0.36.0" awscli
          export HF_HOME=/root/.cache/huggingface HF_HUB_ENABLE_HF_TRANSFER=1
          python - <<'EOF'
          from huggingface_hub import snapshot_download

          JOBS = [
              ("Qwen/Qwen-Image-Edit-2509", None),
              ("tencent/HY-World-2.0",
               ["HY-Pano-2.0/pytorch_lora_weights.safetensors", "HY-WorldMirror-2.0/*"]),
              ("Wan-AI/Wan2.1-I2V-14B-480P-Diffusers", None),
              ("hanshanxue/WorldStereo", ["worldstereo-memory-dmd/*"]),
              ("DiffusionWave/sam3",
               ["*.json", "*.txt", "model.safetensors", "tokenizer*", "vocab*", "merges*"]),
              ("Ruicheng/moge-2-vitl-normal", None),
              ("naver-iv/zim-anything-vitl", ["zim_vit_l_2092/*"]),
              ("IDEA-Research/grounding-dino-tiny", None),
              ("facebook/dinov2-base", None),
          ]
          for repo, patterns in JOBS:
              print(f"=== downloading {repo} (patterns={patterns})", flush=True)
              snapshot_download(repo_id=repo, allow_patterns=patterns)
          print("=== all downloads complete", flush=True)
          EOF
          du -sh /root/.cache/huggingface
          aws configure set default.s3.max_concurrent_requests 32
          echo "=== mirroring to S3"
          time aws s3 sync /root/.cache/huggingface \
            s3://intelli-verse-x-media/models/hy-world/hf --only-show-errors \
            --exclude 'hub/*/blobs/*' --exclude 'hub/.locks/*'
          echo "=== done"
        resources:
          requests: {cpu: "2", memory: 5Gi}
          limits: {cpu: "3500m", memory: 10Gi}
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: scratch
          subPath: hf
      volumes:
      - name: scratch
        persistentVolumeClaim:
          claimName: scratch-mirror-hy-world
